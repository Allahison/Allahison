<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6AD3F7"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6AD3F7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring gradient -->
  <circle cx="100" cy="100" r="98" fill="url(#ringGrad)"/>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="93" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g clip-path="url(#circle)" opacity="0.06">
    <line x1="0" y1="50" x2="200" y2="50" stroke="#6AD3F7" stroke-width="1"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="#6AD3F7" stroke-width="1"/>
    <line x1="0" y1="150" x2="200" y2="150" stroke="#6AD3F7" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="200" stroke="#6AD3F7" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#6AD3F7" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="200" stroke="#6AD3F7" stroke-width="1"/>
  </g>

  <!-- Code symbol main -->
  <text x="100" y="95" font-family="monospace" font-size="52" font-weight="bold"
        fill="url(#codeGrad)" text-anchor="middle" filter="url(#glow)">&lt;/&gt;</text>

  <!-- Name initials below code -->
  <text x="100" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#8b949e" text-anchor="middle" letter-spacing="4">M.ARSLAN</text>

  <!-- Small dots decoration -->
  <circle cx="40" cy="60" r="3" fill="#6AD3F7" opacity="0.5" filter="url(#glow)"/>
  <circle cx="165" cy="140" r="3" fill="#f472b6" opacity="0.5" filter="url(#glow)"/>
  <circle cx="155" cy="55" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="45" cy="145" r="2" fill="#a78bfa" opacity="0.6"/>
</svg>
