<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6AD3F7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6AD3F7;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#6AD3F7;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#6AD3F7" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#6AD3F7" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#6AD3F7" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#6AD3F7" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="200" stroke="#6AD3F7" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#6AD3F7" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="200" stroke="#6AD3F7" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#6AD3F7" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="200" stroke="#6AD3F7" stroke-width="0.5"/>
  </g>

  <!-- Glowing dots -->
  <circle cx="50" cy="40" r="3" fill="#6AD3F7" opacity="0.6" filter="url(#glow)"/>
  <circle cx="860" cy="160" r="3" fill="#f472b6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="200" cy="170" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="700" cy="30" r="2" fill="#6AD3F7" opacity="0.5"/>
  <circle cx="820" cy="90" r="4" fill="#a78bfa" opacity="0.3" filter="url(#glow)"/>
  <circle cx="80" cy="130" r="4" fill="#f472b6" opacity="0.3" filter="url(#glow)"/>

  <!-- Code brackets decoration -->
  <text x="30" y="115" font-family="monospace" font-size="80" fill="#6AD3F7" opacity="0.08">{</text>
  <text x="820" y="115" font-family="monospace" font-size="80" fill="#f472b6" opacity="0.08">}</text>

  <!-- Main name -->
  <text x="450" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="bold"
        fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">Muhammad Arslan</text>

  <!-- Divider line -->
  <rect x="200" y="105" width="500" height="2" fill="url(#lineGrad)" rx="1"/>

  <!-- Subtitle -->
  <text x="450" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="18"
        fill="#8b949e" text-anchor="middle">Full Stack Developer  •  React  •  React Native  •  Laravel</text>

  <!-- Bottom tag -->
  <text x="450" y="175" font-family="monospace" font-size="13"
        fill="#6AD3F7" text-anchor="middle" opacity="0.7">&lt;code&gt; Turning ideas into reality &lt;/code&gt;</text>
</svg>
